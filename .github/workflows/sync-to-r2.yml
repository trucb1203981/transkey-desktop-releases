name: Sync release assets to Cloudflare R2

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to sync (e.g. v1.0.7)'
        required: true
        type: string

env:
  R2_BUCKET: s3://transkey-releases
  KEEP_VERSIONS: 3

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release download "$TAG" \
            --repo trucb1203981/transkey-desktop-releases \
            --dir ./assets

      - name: Configure R2 credentials
        run: |
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set default.region auto

      - name: Upload to R2
        run: |
          aws s3 sync ./assets ${{ env.R2_BUCKET }}/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - name: Cleanup old versions
        run: |
          ENDPOINT="https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          # List all objects, extract version prefixes (e.g. TransKey-1.0.7-arm64.zip → 1.0.7)
          VERSIONS=$(aws s3 ls ${{ env.R2_BUCKET }}/ --endpoint-url "$ENDPOINT" \
            | awk '{print $4}' \
            | grep -oP '\d+\.\d+\.\d+' \
            | sort -V -u)

          TOTAL=$(echo "$VERSIONS" | wc -l | tr -d ' ')
          KEEP=${{ env.KEEP_VERSIONS }}

          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "Only $TOTAL versions, nothing to clean up"
            exit 0
          fi

          # Get versions to delete (all except the latest N)
          DELETE=$(echo "$VERSIONS" | head -n $((TOTAL - KEEP)))
          echo "Keeping latest $KEEP versions, deleting: $(echo $DELETE | tr '\n' ' ')"

          for VER in $DELETE; do
            echo "Deleting v$VER assets..."
            aws s3 ls ${{ env.R2_BUCKET }}/ --endpoint-url "$ENDPOINT" \
              | awk '{print $4}' \
              | grep "$VER" \
              | while read FILE; do
                aws s3 rm "${{ env.R2_BUCKET }}/$FILE" --endpoint-url "$ENDPOINT"
                echo "  Deleted $FILE"
              done
          done
